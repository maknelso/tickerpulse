services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      # Apache Kafka specific variable names
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_CLUSTER_ID=5L6g3nShT-eMCtK--X86sw # Using the ID from your logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    env_file:
      - .env  
    depends_on:
      - kafka
    environment:
      - KAFKA_URL=kafka:9092
      - PYTHONUNBUFFERED=1  

  worker:
      build:
        context: .
        dockerfile: worker/Dockerfile
      depends_on:
        kafka:                         # No dash here
          condition: service_healthy    # This tells Docker to wait for the healthcheck
      environment:
        - KAFKA_URL=kafka:9092
        - PYTHONUNBUFFERED=1           # Keep this so we see logs instantly